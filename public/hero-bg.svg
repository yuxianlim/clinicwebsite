<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="accentGradient" cx="60%" cy="40%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.35" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0" />
    </radialGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Base gradient background -->
  <rect width="1920" height="1080" fill="url(#bgGradient)"/>
  
  <!-- Accent gradient overlay -->
  <circle cx="1600" cy="200" r="800" fill="url(#accentGradient)"/>
  <circle cx="300" cy="900" r="600" fill="url(#accentGradient)"/>
  
  <!-- Bold decorative circles -->
  <circle cx="1700" cy="300" r="150" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.35"/>
  <circle cx="1700" cy="300" r="200" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.2"/>
  
  <circle cx="250" cy="850" r="180" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.3"/>
  <circle cx="250" cy="850" r="240" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.15"/>
  
  <!-- Yin-Yang inspired design (more prominent) -->
  <g opacity="0.35">
    <circle cx="1600" cy="280" r="120" fill="none" stroke="#22c55e" stroke-width="3"/>
    <path d="M 1600 160 A 120 120 0 0 1 1600 400 A 120 120 0 0 1 1600 160" fill="none" stroke="#22c55e" stroke-width="3" opacity="0.7"/>
    <circle cx="1600" cy="220" r="25" fill="#22c55e" opacity="0.6"/>
    <circle cx="1600" cy="360" r="25" fill="#22c55e" opacity="0.6"/>
  </g>
  
  <!-- Acupuncture needle elements - more visible -->
  <g opacity="0.25">
    <!-- Needle 1 -->
    <line x1="300" y1="200" x2="320" y2="250" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    <circle cx="300" cy="200" r="6" fill="#22c55e"/>
    
    <!-- Needle 2 -->
    <line x1="450" y1="150" x2="470" y2="210" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    <circle cx="450" cy="150" r="6" fill="#22c55e"/>
    
    <!-- Needle 3 -->
    <line x1="1750" y1="550" x2="1770" y2="610" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    <circle cx="1750" cy="550" r="6" fill="#22c55e"/>
  </g>
  
  <!-- Organic flowing lines - bolder -->
  <g opacity="0.18" stroke="#22c55e" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M 100 600 Q 300 550 500 620 T 900 550" />
    <path d="M 1200 900 Q 1400 850 1600 920 T 1920 850" />
    <path d="M 1850 100 Q 1700 200 1550 150 T 1300 250" />
  </g>
  
  <!-- Leaf-like botanical elements - more prominent -->
  <g opacity="0.2" fill="none" stroke="#22c55e" stroke-width="2.5">
    <!-- Leaf 1 -->
    <path d="M 150 750 Q 180 700 200 750 Q 180 800 150 750" />
    <line x1="175" y1="700" x2="175" y2="800" stroke="#22c55e" stroke-width="2" opacity="0.8"/>
    
    <!-- Leaf 2 -->
    <path d="M 1850 200 Q 1880 150 1900 200 Q 1880 250 1850 200" />
    <line x1="1875" y1="150" x2="1875" y2="250" stroke="#22c55e" stroke-width="2" opacity="0.8"/>
    
    <!-- Leaf 3 -->
    <path d="M 400 950 Q 430 900 450 950 Q 430 1000 400 950" />
    <line x1="425" y1="900" x2="425" y2="1000" stroke="#22c55e" stroke-width="2" opacity="0.8"/>
  </g>
  
  <!-- Subtle hexagon pattern (modern touch) - more visible -->
  <g opacity="0.12" stroke="#22c55e" stroke-width="1.5" fill="none">
    <polygon points="900,100 950,80 1000,100 1000,150 950,170 900,150" />
    <polygon points="1100,800 1150,780 1200,800 1200,850 1150,870 1100,850" />
    <polygon points="500,400 550,380 600,400 600,450 550,470 500,450" />
  </g>
  
  <!-- Breath/energy circles - more visible -->
  <g opacity="0.15">
    <circle cx="960" cy="540" r="300" fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,5"/>
    <circle cx="960" cy="540" r="400" fill="none" stroke="#22c55e" stroke-width="1" stroke-dasharray="8,4" opacity="0.8"/>
  </g>
  
  <!-- Additional bold accent elements -->
  <g opacity="0.2">
    <!-- Top right corner accent -->
    <path d="M 1850 50 L 1920 50 L 1920 120 Q 1920 50 1850 50" fill="none" stroke="#22c55e" stroke-width="2"/>
    <!-- Bottom left corner accent -->
    <path d="M 50 1030 L 50 1080 L 120 1080 Q 50 1080 50 1030" fill="none" stroke="#22c55e" stroke-width="2"/>
  </g>
</svg>
